name: Bug Report
description: Report a product, UI, workflow, or infrastructure bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the user or operator impact.
      placeholder: A concise description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the smallest reliable reproduction steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - PT Workspace
        - PT Hub
        - Client App
        - Supabase / Database
        - CI / Deploy
        - Docs / Repo
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra Context
      description: Logs, screenshots, environment details, or suspected root cause.
