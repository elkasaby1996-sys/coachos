name: Feature Request
description: Propose a product, workflow, or platform improvement.
title: "[Feature]: "
labels:
  - feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Or Opportunity
      description: What pain point or opportunity is this addressing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed Change
      description: Describe the change at a product or system level.
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - PT Workspace
        - PT Hub
        - Client App
        - Supabase / Database
        - CI / Deploy
        - Docs / Repo
    validations:
      required: true

  - type: textarea
    id: constraints
    attributes:
      label: Constraints Or Risks
      description: Mention rollout concerns, migrations, UX risks, or compatibility concerns.

  - type: textarea
    id: success
    attributes:
      label: Definition Of Success
      description: What would make this change clearly successful?
