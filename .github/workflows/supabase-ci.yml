name: Supabase CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: v2.109.1

      - name: Start local Supabase database
        run: supabase db start --yes

      - name: Lint database schema
        run: supabase db lint --local --level error --fail-on error

      - name: Run database tests
        run: |
          if [ -d supabase/tests ]; then
            supabase test db
          else
            echo "No Supabase database tests found in supabase/tests. Skipping pgTAP."
          fi
