name: Supabase CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase database
        run: supabase db start --yes

      - name: Lint database schema
        run: supabase db lint --local --level error --fail-on error

      - name: Run database tests
        run: |
          if [ -d supabase/tests ]; then
            supabase test db
          else
            echo "No Supabase database tests found in supabase/tests. Skipping pgTAP."
          fi
