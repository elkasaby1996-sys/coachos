name: Supabase Deploy Staging

on:
  push:
    branches: ["main"]
    paths:
      - "supabase/**"
      - ".github/workflows/supabase-deploy-staging.yml"
      - ".github/workflows/supabase-ci.yml"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: supabase-staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Validate deploy secrets
        run: |
          required=(
            SUPABASE_ACCESS_TOKEN
            SUPABASE_PROJECT_ID
            SUPABASE_DB_PASSWORD
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Supabase staging deploy secrets are incomplete."
            exit 1
          fi

      - name: Link staging project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations to staging
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
