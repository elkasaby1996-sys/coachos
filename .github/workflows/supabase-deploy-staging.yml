name: Supabase Deploy Staging

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: supabase-staging
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: v2.109.1

      - name: Validate deploy secrets
        run: |
          required=(
            SUPABASE_ACCESS_TOKEN
            SUPABASE_PROJECT_ID
            SUPABASE_DB_PASSWORD
            VITE_SUPABASE_URL
            VITE_SUPABASE_ANON_KEY
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Supabase staging deploy secrets are incomplete."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: v2.109.1

      - name: Link staging project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Confirm hosted migration deployment
        run: echo "Manual workflow dispatch confirmed. The next step applies pending migrations to the hosted staging Supabase project."

      - name: Push migrations to staging
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Open Wearables function to staging
        run: supabase functions deploy open-wearables --project-ref "$SUPABASE_PROJECT_ID"
