name: Supabase Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: supabase-production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate deploy secrets
        run: |
          required=(
            SUPABASE_ACCESS_TOKEN
            SUPABASE_PROJECT_ID
            SUPABASE_DB_PASSWORD
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Supabase production deploy secrets are incomplete."
            exit 1
          fi

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Confirm hosted migration deployment
        run: echo "Manual workflow dispatch confirmed. The next step applies pending migrations to the hosted production Supabase project."

      - name: Push migrations to production
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Open Wearables function to production
        run: supabase functions deploy open-wearables --project-ref "$SUPABASE_PROJECT_ID"
