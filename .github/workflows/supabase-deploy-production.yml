name: Supabase Deploy Production

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: supabase-production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate deploy secrets
        run: |
          required=(
            SUPABASE_ACCESS_TOKEN
            SUPABASE_PROJECT_ID
            SUPABASE_DB_PASSWORD
          )

          missing=0
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "Supabase production deploy secrets are incomplete."
            exit 1
          fi

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Push migrations to production
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy Open Wearables function to production
        run: supabase functions deploy open-wearables --project-ref "$SUPABASE_PROJECT_ID"
